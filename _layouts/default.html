<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/dracula.min.css">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      <span class="logo-caret">&rsaquo;</span>re-blog
    </a>
  </div>
  <div class="header-right">
    <nav class="hdr-actions">
      <a href="{{ '/' | relative_url }}" class="btn btn-ghost">Posts</a>
      <a href="{{ '/about' | relative_url }}" class="btn btn-ghost">About</a>
      <a href="{{ '/admin' | relative_url }}" class="btn btn-ghost">Admin</a>
    </nav>
  </div>
</header>

<main class="view">
  <div class="home-wrap">
    {{ content }}
  </div>
</main>

<footer class="site-footer">
  <div class="wrap">
    <span>&copy; {{ site.time | date: '%Y' }} hazouka</span>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>document.addEventListener('DOMContentLoaded',function(){document.querySelectorAll('.markdown-body pre code:not(:has(span))').forEach(function(b){hljs.highlightElement(b)})});</script>
<script>
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.markdown-body pre').forEach(function(pre){
    var code=pre.querySelector('code');if(!code)return;
    var lang='';var cls=code.className.match(/language-(\w+)/);
    if(cls)lang=cls[1];else if(pre.className.match(/language-(\w+)/))lang=pre.className.match(/language-(\w+)/)[1];
    var wrap=document.createElement('div');wrap.className='code-block-bar';
    var label=document.createElement('span');label.className='code-lang';label.textContent=lang||'code';
    var btn=document.createElement('button');btn.className='copy-btn';btn.textContent='Copy';
    btn.addEventListener('click',function(){
      var t=code.textContent||code.innerText;
      navigator.clipboard.writeText(t).then(function(){
        btn.textContent='Copied!';btn.classList.add('copied');
        setTimeout(function(){btn.textContent='Copy';btn.classList.remove('copied')},2000);
      });
    });
    wrap.appendChild(label);wrap.appendChild(btn);
    pre.insertBefore(wrap,pre.firstChild);
  });
});
</script>
</body>
</html>
