<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/dracula.min.css">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      <span class="logo-caret">&rsaquo;</span>re-blog
    </a>
  </div>
  <div class="header-right">
    <nav class="hdr-actions">
      <a href="{{ '/' | relative_url }}" class="btn btn-ghost">Posts</a>
      <a href="{{ '/about' | relative_url }}" class="btn btn-ghost">About</a>
      <a href="{{ '/admin' | relative_url }}" class="btn btn-ghost">Admin</a>
    </nav>
  </div>
</header>

<main class="view">
  <div class="home-wrap">
    {{ content }}
  </div>
</main>

<footer class="site-footer">
  <div class="wrap">
    <span>&copy; {{ site.time | date: '%Y' }} hazouka</span>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>hljs.highlightAll();</script>
</body>
</html>
