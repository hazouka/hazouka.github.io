<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <a href="/" class="site-logo">
      <span class="logo-caret">&rsaquo;</span>re-blog
    </a>
  </div>
  <div class="header-right">
    <nav class="hdr-actions">
      <a href="/" class="btn btn-ghost">Posts</a>
      <a href="/about" class="btn btn-ghost">About</a>
    </nav>
  </div>
</header>

<main class="view">
  <div class="home-wrap">
    {{ content }}
  </div>
</main>

<footer class="site-footer">
  <div class="wrap">
    <span>&copy; {{ site.time | date: '%Y' }} hazouka</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/x86asm.min.js"></script>
<script>hljs.registerAliases('asm',{languageName:'x86asm'})</script>
<script>document.addEventListener('DOMContentLoaded',function(){
  try{
  document.querySelectorAll('.markdown-body pre code').forEach(function(b){
    if(!b.querySelector('span'))hljs.highlightElement(b);
  });
  document.querySelectorAll('.highlight code').forEach(function(el){
    el.querySelectorAll('span.n').forEach(function(sp){
      var nx=sp.nextElementSibling;
      if(nx&&nx.classList.contains('p')&&nx.textContent.startsWith('('))sp.className='nf';
    });
    el.querySelectorAll('span.o').forEach(function(sp){
      if(!sp.textContent.startsWith('~'))return;
      var p=sp.previousElementSibling;
      if(!p||!p.classList.contains('p')||!p.textContent.startsWith('::'))return;
      var p2=p.previousElementSibling;
      if(!p2||!p2.classList.contains('n'))return;
      var n=sp.nextElementSibling;
      if(!n||!n.classList.contains('n'))return;
      var n2=n.nextElementSibling;
      if(!n2||!n2.classList.contains('p')||!n2.textContent.startsWith('('))return;
      p2.className='nf';n.className='nf';
    });
    el.querySelectorAll('span.n').forEach(function(sp){
      if(sp.textContent!=='std')return;
      var nx=sp.nextElementSibling;
      if(!nx||!nx.textContent.startsWith('::'))return;
      var nx2=nx.nextElementSibling;
      if(!nx2||!nx2.classList.contains('n'))return;
      if(nx2.nextElementSibling&&nx2.nextElementSibling.textContent.startsWith('::'))return;
      nx2.className='kt';
    });
  });
  }catch(e){console.error(e)}
});</script>
<script>
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.markdown-body pre').forEach(function(pre){
    pre.style.position='relative';
    var code=pre.querySelector('code');if(!code)return;
    var btn=document.createElement('button');btn.className='copy-btn';btn.textContent='Copy';
    btn.addEventListener('click',function(){
      var t=code.textContent||code.innerText;
      navigator.clipboard.writeText(t).then(function(){
        btn.textContent='Copied!';btn.classList.add('copied');
        setTimeout(function(){btn.textContent='Copy';btn.classList.remove('copied')},2000);
      });
    });
    pre.appendChild(btn);
  });
});
</script>
</body>
</html>
