---
layout: default
title: Admin
---

<style>
  .admin-editor { display: none; max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; height: calc(100vh - var(--header-h) - 3rem); box-sizing: border-box; }
  .admin-editor .top-row { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .admin-editor .top-row input { padding: 0.4rem 0.7rem; background: var(--bg-alt); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font-mono); font-size: 0.82rem; outline: none; }
  .admin-editor .top-row input:focus { border-color: var(--accent); }
  .admin-editor .top-row input[name="title"] { flex: 1; min-width: 150px; }
  .admin-editor .top-row input[name="date"] { width: 140px; }
  .admin-editor .top-row input[name="tags"] { width: 200px; }
  .admin-editor .top-row button { padding: 0.4rem 0.9rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-alt); color: var(--text); font-family: var(--font-ui); font-size: 0.8rem; cursor: pointer; }
  .admin-editor .top-row button:hover { background: var(--bg-hover); }
  .admin-editor .top-row .primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .admin-editor .top-row .primary:hover { filter: brightness(1.1); }
  .admin-editor .top-row .danger { border-color: var(--d-red); color: var(--d-red); }
  .admin-editor .top-row .danger:hover { background: rgba(255,85,85,0.1); }
  .admin-editor .top-row .status { margin-left: auto; font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-dim); }
  .admin-editor .split { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; height: calc(100% - 3rem); }
  .admin-editor .split textarea { width: 100%; height: 100%; padding: 0.8rem; background: var(--bg-alt); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font-mono); font-size: 0.82rem; line-height: 1.6; resize: none; outline: none; box-sizing: border-box; }
  .admin-editor .split textarea:focus { border-color: var(--accent); }
  .admin-editor .split .preview-pane { overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-alt); padding: 0.8rem; }
  .admin-editor .split .preview-pane .markdown-body { font-size: 0.9rem; }
  .admin-editor .split .preview-pane .markdown-body pre { font-size: 0.78rem; }
  .admin-editor .split .preview-pane .markdown-body img { max-width: 100%; }

  .admin-login { max-width: 400px; margin: 4rem auto; padding: 2rem; background: var(--bg-alt); border-radius: var(--radius-lg); border: 1px solid var(--border); }
  .admin-login h2 { font-family: var(--font-ui); font-size: 1.1rem; color: var(--text-head); margin-bottom: 1rem; }
  .admin-login .field { margin-bottom: 0.75rem; }
  .admin-login label { font-family: var(--font-ui); font-size: 0.8rem; color: var(--text-dim); display: block; margin-bottom: 0.25rem; }
  .admin-login input { width: 100%; padding: 0.5rem 0.7rem; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font-mono); font-size: 0.85rem; outline: none; box-sizing: border-box; }
  .admin-login input:focus { border-color: var(--accent); }
  .admin-login .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .admin-login .actions button { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 0.85rem; cursor: pointer; }
  .admin-login .actions button:hover { background: var(--bg-hover); }
  .admin-login .actions .primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .admin-login .actions .primary:hover { filter: brightness(1.1); }
  .admin-msg { padding: 0.5rem 1rem; border-radius: var(--radius); font-family: var(--font-ui); font-size: 0.85rem; margin-bottom: 0.75rem; display: none; }
  .admin-msg.ok { display: block; background: rgba(80,250,123,0.1); border: 1px solid rgba(80,250,123,0.2); color: var(--d-green); }
  .admin-msg.err { display: block; background: rgba(255,85,85,0.1); border: 1px solid rgba(255,85,85,0.2); color: var(--d-red); }

  @media (max-width: 768px) { .admin-editor .split { grid-template-columns: 1fr; } .admin-editor .split textarea { height: 40vh; } .admin-editor .split .preview-pane { height: 50vh; } }
</style>

<div id="adminApp">
  <div id="adminMsg" class="admin-msg"></div>

  <!-- Login -->
  <div id="loginSection" class="admin-login">
    <h2>GitHub Login</h2>
    <div class="field"><label for="ghToken">Token</label><input type="password" id="ghToken" placeholder="github_pat_..." autocomplete="off"></div>
    <div class="field"><label for="ghOwner">Owner</label><input type="text" id="ghOwner" value="hazouka"></div>
    <div class="field"><label for="ghBranch">Branch</label><input type="text" id="ghBranch" value="main"></div>
    <div class="actions">
      <button class="primary" id="loginBtn">Login</button>
      <button id="clearLoginBtn">Clear</button>
    </div>
  </div>

  <!-- Editor -->
  <div id="editorSection" class="admin-editor">
    <div class="top-row">
      <input type="text" name="title" id="postTitle" placeholder="Title">
      <input type="date" name="date" id="postDate">
      <input type="text" name="tags" id="postTags" placeholder="Tags (comma)">
      <button class="primary" id="saveBtn">Save</button>
      <button class="danger" id="deleteBtn" style="display:none">Delete</button>
      <span class="status" id="postStatus"></span>
    </div>
    <div class="split">
      <textarea id="postContent" placeholder="Write markdown..."></textarea>
      <div class="preview-pane"><div class="markdown-body" id="previewContent"></div></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script>
(function() {
  const STORAGE_KEY = 'reblog-admin-v4';
  const DRAFT_KEY = 'reblog-draft-v4';
  let currentFile = null;

  const $ = id => document.getElementById(id);
  const msg = $('adminMsg');

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = 'admin-msg ' + type;
    setTimeout(() => { msg.className = 'admin-msg'; }, 5000);
  }

  function loadSettings() {
    try { const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      $('ghToken').value = s.token || '';
      $('ghOwner').value = s.owner || 'hazouka';
      $('ghBranch').value = s.branch || 'main';
    } catch(e) {}
  }

  function saveSettings() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      token: $('ghToken').value.trim(),
      owner: $('ghOwner').value.trim() || 'hazouka',
      branch: $('ghBranch').value.trim() || 'main'
    }));
  }
  function clearSettings() { localStorage.removeItem(STORAGE_KEY); loadSettings(); }

  function loadDraft() {
    try { const d = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
      if (d.title) $('postTitle').value = d.title;
      if (d.date) $('postDate').value = d.date;
      if (d.tags) $('postTags').value = d.tags;
      if (d.content) $('postContent').value = d.content;
      if (d.file) currentFile = d.file;
    } catch(e) {}
  }
  function saveDraft() {
    localStorage.setItem(DRAFT_KEY, JSON.stringify({
      title: $('postTitle').value, date: $('postDate').value,
      tags: $('postTags').value, content: $('postContent').value, file: currentFile
    }));
  }

  function slugify(text) { return text.toLowerCase().replace(/[^\w\s-]/g,'').replace(/[\s_]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'')||'untitled'; }

  function getConfig() {
    return { token: $('ghToken').value.trim(), owner: $('ghOwner').value.trim() || 'hazouka', branch: $('ghBranch').value.trim() || 'main' };
  }

  let repo = 'hazouka.github.io';

  async function ghFetch(path, options = {}) {
    const cfg = getConfig();
    const res = await fetch('https://api.github.com/repos/' + cfg.owner + '/' + repo + path, {
      ...options,
      headers: { Accept: 'application/vnd.github+json', Authorization: 'Bearer ' + cfg.token, 'X-GitHub-Api-Version': '2022-11-28', ...options.headers }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'HTTP ' + res.status);
    return data;
  }

  async function getFile(path) { try { return await ghFetch('/contents/' + encodeURIComponent(path)); } catch(e) { return null; } }

  async function saveFile(path, content, message) {
    const existing = await getFile(path);
    const body = { message: message || 'Update post via admin', content: btoa(unescape(encodeURIComponent(content))), branch: getConfig().branch };
    if (existing && existing.sha) body.sha = existing.sha;
    return await ghFetch('/contents/' + encodeURIComponent(path), { method: 'PUT', body: JSON.stringify(body) });
  }

  async function deleteFile(path, message) {
    const existing = await getFile(path);
    if (!existing) return;
    await ghFetch('/contents/' + encodeURIComponent(path), { method: 'DELETE', body: JSON.stringify({ message: message || 'Delete post via admin', sha: existing.sha, branch: getConfig().branch }) });
  }

  function buildPostFilename(title, date) {
    const slug = slugify(title);
    const d = date ? new Date(date + 'T12:00:00') : new Date();
    return '_posts/' + d.toISOString().split('T')[0] + '-' + slug + '.md';
  }

  function buildPostContent(title, date, tags, content) {
    let fm = '---\ntitle: "' + title.replace(/"/g,'\\"') + '"\n';
    fm += 'date: ' + (date || new Date().toISOString().split('T')[0]) + ' 12:00:00 +0000\n';
    if (tags) { var tagArr = tags.split(',').map(t=>t.trim()).filter(Boolean); if (tagArr.length) fm += 'tags: [' + tagArr.join(', ') + ']\n'; }
    fm += '---\n\n' + content;
    return fm;
  }

  window._editPost = async function(path) {
    try {
      const data = await ghFetch('/contents/' + encodeURIComponent(path));
      const raw = decodeURIComponent(escape(atob(data.content)));
      var m = raw.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
      if (m) {
        $('postTitle').value = (m[1].match(/title:\s*"?([^"\n]+)"?/)||[,''])[1].trim();
        var d = (m[1].match(/date:\s*(\S+)/)||[,''])[1];
        if (d) $('postDate').value = d.split(' ')[0];
        $('postTags').value = (m[1].match(/tags:\s*\[([^\]]*)\]/)||[,''])[1] || '';
        $('postContent').value = m[2].trim();
        currentFile = path;
        $('deleteBtn').style.display = 'inline-block';
        $('postStatus').textContent = path;
        updatePreview();
        saveDraft();
      }
    } catch(e) { showMsg('Failed: ' + e.message, 'err'); }
  };

  function updatePreview() {
    var content = $('postContent').value;
    $('previewContent').innerHTML = content ? marked.parse(content) : '<p style="color:var(--text-dim);font-size:0.85rem">preview</p>';
  }

  var pt = null;
  $('postContent').addEventListener('input', function() { clearTimeout(pt); pt = setTimeout(updatePreview, 150); saveDraft(); });
  $('postTitle').addEventListener('input', saveDraft);
  $('postDate').addEventListener('change', saveDraft);
  $('postTags').addEventListener('input', saveDraft);

  $('loginBtn').addEventListener('click', async function() {
    var cfg = getConfig();
    if (!cfg.token || !cfg.owner) { showMsg('Token and owner required', 'err'); return; }
    try {
      var data = await ghFetch('');
      repo = data.name || 'hazouka.github.io';
      saveSettings();
      $('loginSection').style.display = 'none';
      $('editorSection').style.display = 'block';
      loadDraft();
      updatePreview();
      showMsg('Logged in as ' + cfg.owner + '/' + repo, 'ok');
    } catch(e) { showMsg('Login failed: ' + e.message, 'err'); }
  });

  $('clearLoginBtn').addEventListener('click', clearSettings);

  $('saveBtn').addEventListener('click', async function() {
    var title = $('postTitle').value.trim(), date = $('postDate').value, tags = $('postTags').value.trim(), content = $('postContent').value.trim();
    if (!title || !content) { showMsg('Title and content required', 'err'); return; }
    var filename = currentFile || buildPostFilename(title, date);
    try {
      await saveFile(filename, buildPostContent(title, date, tags, content), currentFile ? 'Update ' + currentFile : 'New post: ' + title);
      showMsg('Saved: ' + filename, 'ok');
      currentFile = filename;
      $('deleteBtn').style.display = 'inline-block';
      $('postStatus').textContent = filename;
      localStorage.removeItem(DRAFT_KEY);
    } catch(e) { showMsg('Save failed: ' + e.message, 'err'); }
  });

  $('deleteBtn').addEventListener('click', function() {
    if (!currentFile) return;
    if (!confirm('Delete this post?')) return;
    (async function() {
      try { await deleteFile(currentFile, 'Delete ' + currentFile);
        showMsg('Deleted', 'ok');
        $('postTitle').value = ''; $('postDate').value = ''; $('postTags').value = ''; $('postContent').value = '';
        currentFile = null; $('deleteBtn').style.display = 'none'; $('postStatus').textContent = '';
        localStorage.removeItem(DRAFT_KEY); updatePreview();
      } catch(e) { showMsg('Delete failed: ' + e.message, 'err'); }
    })();
  });

  loadSettings();
  var cfg = getConfig();
  if (cfg.token && cfg.owner) {
    (async function() {
      try { var data = await ghFetch(''); repo = data.name || 'hazouka.github.io';
        $('loginSection').style.display = 'none'; $('editorSection').style.display = 'block';
        loadDraft(); updatePreview();
      } catch(e) {}
    })();
  }

  var ep = new URLSearchParams(window.location.search).get('edit');
  if (ep) {
    (function w() {
      if (typeof repo !== 'undefined' && $('editorSection').style.display === 'block') { setTimeout(function(){ window._editPost(ep); }, 300); }
      else { setTimeout(w, 300); }
    })();
  }
})();
</script>
