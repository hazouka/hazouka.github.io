---
layout: default
title: Admin
---

<style>
  .admin-login { max-width: 400px; margin: 2rem auto; padding: 2rem; background: var(--bg-alt); border-radius: var(--radius-lg); border: 1px solid var(--border); }
  .admin-login h2 { font-family: var(--font-ui); font-size: 1.1rem; color: var(--text-head); margin-bottom: 1rem; }
  .admin-login .field { margin-bottom: 0.75rem; }
  .admin-login label { font-family: var(--font-ui); font-size: 0.8rem; color: var(--text-dim); display: block; margin-bottom: 0.25rem; }
  .admin-login input { width: 100%; padding: 0.5rem 0.7rem; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font-mono); font-size: 0.85rem; outline: none; box-sizing: border-box; }
  .admin-login input:focus { border-color: var(--accent); }
  .admin-login .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .admin-login .actions button { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 0.85rem; cursor: pointer; }
  .admin-login .actions button:hover { background: var(--bg-hover); }
  .admin-login .actions .primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .admin-login .actions .primary:hover { filter: brightness(1.1); }

  .admin-editor { display: none; }
  .admin-editor h1 { font-family: var(--font-ui); font-size: 1.4rem; color: var(--text-head); margin-bottom: 0.25rem; }
  .admin-editor > p { color: var(--text-dim); margin-bottom: 1.5rem; font-size: 0.9rem; }
  .admin-toolbar { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.75rem; }
  .admin-toolbar button { padding: 0.4rem 0.9rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-alt); color: var(--text); font-family: var(--font-ui); font-size: 0.8rem; cursor: pointer; }
  .admin-toolbar button:hover { background: var(--bg-hover); }
  .admin-toolbar .primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .admin-toolbar .primary:hover { filter: brightness(1.1); }
  .admin-toolbar .danger { border-color: var(--d-red); color: var(--d-red); }
  .admin-toolbar .danger:hover { background: rgba(255,85,85,0.1); }
  .admin-toolbar .status { margin-left: auto; font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-dim); }

  .admin-meta { display: flex; gap: 0.75rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .admin-meta input { padding: 0.4rem 0.7rem; background: var(--bg-alt); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font-mono); font-size: 0.82rem; outline: none; }
  .admin-meta input:focus { border-color: var(--accent); }
  .admin-meta input[type="text"] { flex: 1; min-width: 150px; }
  .admin-meta input[type="date"] { width: 140px; }
  .admin-meta input[name="tags"] { width: 200px; }

  .admin-split { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0.75rem; }
  .admin-split textarea { width: 100%; height: 55vh; padding: 0.8rem; background: var(--bg-alt); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font-mono); font-size: 0.82rem; line-height: 1.6; resize: vertical; outline: none; box-sizing: border-box; }
  .admin-split textarea:focus { border-color: var(--accent); }
  .admin-split .preview-pane { overflow-y: auto; height: 55vh; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-alt); }
  .admin-split .preview-pane .markdown-body { padding: 0.8rem; font-size: 0.9rem; }
  .admin-split .preview-pane .markdown-body pre { font-size: 0.78rem; }
  .admin-split .preview-pane .markdown-body img { max-width: 100%; }

  .admin-msg { padding: 0.5rem 1rem; border-radius: var(--radius); font-family: var(--font-ui); font-size: 0.85rem; margin-bottom: 0.75rem; display: none; }
  .admin-msg.ok { display: block; background: rgba(80, 250, 123, 0.1); border: 1px solid rgba(80, 250, 123, 0.2); color: var(--d-green); }
  .admin-msg.err { display: block; background: rgba(255, 85, 85, 0.1); border: 1px solid rgba(255, 85, 85, 0.2); color: var(--d-red); }

  .admin-posts { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
  .admin-posts h2 { font-family: var(--font-ui); font-size: 1rem; color: var(--text-head); margin-bottom: 0.75rem; }
  .admin-post-item { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 0.4rem; background: var(--bg-alt); }
  .admin-post-item .p-title { font-family: var(--font-ui); font-size: 0.85rem; color: var(--text); }
  .admin-post-item .p-path { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-dim); margin-left: 0.5rem; }
  .admin-post-item .p-actions { display: flex; gap: 0.3rem; }
  .admin-post-item .p-actions button { padding: 0.2rem 0.5rem; font-size: 0.7rem; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); cursor: pointer; }
  .admin-post-item .p-actions button:hover { background: var(--bg-hover); }
  .admin-post-item .p-actions .del { color: var(--d-red); border-color: var(--d-red); }

  .slug-preview { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-mute); margin-bottom: 0.5rem; }

  @media (max-width: 768px) { .admin-split { grid-template-columns: 1fr; } .admin-split textarea { height: 30vh; } .admin-split .preview-pane { height: 40vh; } .admin-meta { flex-direction: column; } .admin-meta input[type="date"] { width: 100%; } .admin-meta input[name="tags"] { width: 100%; } }
</style>

<div id="adminApp">
  <div id="adminMsg" class="admin-msg"></div>

  <!-- Login -->
  <div id="loginSection" class="admin-login">
    <h2>GitHub Login</h2>
    <div class="field">
      <label for="ghToken">Token (repo contents: write)</label>
      <input type="password" id="ghToken" placeholder="github_pat_..." autocomplete="off">
    </div>
    <div class="field">
      <label for="ghOwner">Owner</label>
      <input type="text" id="ghOwner" value="hazouka">
    </div>
    <div class="field">
      <label for="ghBranch">Branch</label>
      <input type="text" id="ghBranch" value="main">
    </div>
    <div class="actions">
      <button class="primary" id="loginBtn">Login</button>
      <button id="clearLoginBtn">Clear</button>
    </div>
  </div>

  <!-- Editor -->
  <div id="editorSection" class="admin-editor">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem">
      <h1>New Post</h1>
      <button id="newPostBtn" style="padding:0.35rem 0.8rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-alt);color:var(--text);font-family:var(--font-ui);font-size:0.8rem;cursor:pointer">+ New Post</button>
    </div>
    <p>Write in markdown. Preview updates on every keystroke.</p>

    <div class="admin-toolbar">
      <button class="primary" id="saveBtn">Save</button>
      <button class="danger" id="deleteBtn" style="display:none">Delete</button>
      <span class="status" id="postStatus"></span>
    </div>

    <div class="slug-preview" id="slugPreview">/slug-will-be-here/</div>

    <div class="admin-meta">
      <input type="text" id="postTitle" placeholder="Title">
      <input type="date" id="postDate">
      <input type="text" id="postTags" name="tags" placeholder="Tags (comma separated)">
    </div>

    <div class="admin-split">
      <textarea id="postContent" placeholder="Write your post in markdown..."></textarea>
      <div class="preview-pane" id="previewPane">
        <div class="markdown-body" id="previewContent"></div>
      </div>
    </div>

    <!-- Existing posts -->
    <div class="admin-posts" id="adminPosts">
      <h2>Existing Posts</h2>
      <div id="postsList"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script>
(function() {
  const STORAGE_KEY = 'reblog-admin-v3';
  const DRAFT_KEY = 'reblog-draft-v3';
  let currentFile = null;
  let loginAttempted = false;

  const $ = id => document.getElementById(id);
  const msg = $('adminMsg');

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = 'admin-msg ' + type;
    setTimeout(() => { msg.className = 'admin-msg'; }, 5000);
  }

  function loadSettings() {
    try {
      const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      $('ghToken').value = s.token || '';
      $('ghOwner').value = s.owner || 'hazouka';
      $('ghBranch').value = s.branch || 'main';
    } catch(e) {}
  }

  function saveSettings() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      token: $('ghToken').value.trim(),
      owner: $('ghOwner').value.trim() || 'hazouka',
      branch: $('ghBranch').value.trim() || 'main'
    }));
  }

  function clearSettings() {
    localStorage.removeItem(STORAGE_KEY);
    loadSettings();
  }

  function loadDraft() {
    try {
      const d = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
      if (d.title) $('postTitle').value = d.title;
      if (d.date) $('postDate').value = d.date;
      if (d.tags) $('postTags').value = d.tags;
      if (d.content) $('postContent').value = d.content;
      if (d.file) currentFile = d.file;
    } catch(e) {}
  }

  function saveDraft() {
    localStorage.setItem(DRAFT_KEY, JSON.stringify({
      title: $('postTitle').value,
      date: $('postDate').value,
      tags: $('postTags').value,
      content: $('postContent').value,
      file: currentFile
    }));
  }

  function slugify(text) {
    return text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/[\s_]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '') || 'untitled';
  }

  function updateSlug() {
    const title = $('postTitle').value;
    $('slugPreview').textContent = '→ _posts/' + ($('postDate').value || 'YYYY-MM-DD') + '-' + slugify(title) + '.md';
  }

  function getConfig() {
    return {
      token: $('ghToken').value.trim(),
      owner: $('ghOwner').value.trim() || 'hazouka',
      branch: $('ghBranch').value.trim() || 'main'
    };
  }

  let repo = 'hazouka.github.io';

  async function ghFetch(path, options = {}) {
    const cfg = getConfig();
    const url = 'https://api.github.com/repos/' + cfg.owner + '/' + repo + path;
    const res = await fetch(url, {
      ...options,
      headers: {
        Accept: 'application/vnd.github+json',
        Authorization: 'Bearer ' + cfg.token,
        'X-GitHub-Api-Version': '2022-11-28',
        ...options.headers
      }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'HTTP ' + res.status);
    return data;
  }

  async function getFile(path) {
    try {
      return await ghFetch('/contents/' + encodeURIComponent(path));
    } catch(e) { return null; }
  }

  async function saveFile(path, content, message) {
    const existing = await getFile(path);
    const body = {
      message: message || 'Update post via admin',
      content: btoa(unescape(encodeURIComponent(content))),
      branch: getConfig().branch
    };
    if (existing && existing.sha) body.sha = existing.sha;
    return await ghFetch('/contents/' + encodeURIComponent(path), { method: 'PUT', body: JSON.stringify(body) });
  }

  async function deleteFile(path, message) {
    const existing = await getFile(path);
    if (!existing) return;
    await ghFetch('/contents/' + encodeURIComponent(path), { method: 'DELETE', body: JSON.stringify({ message: message || 'Delete post via admin', sha: existing.sha, branch: getConfig().branch }) });
  }

  function buildPostFilename(title, date) {
    const slug = slugify(title);
    const d = date ? new Date(date + 'T12:00:00') : new Date();
    const ds = d.toISOString().split('T')[0];
    return '_posts/' + ds + '-' + slug + '.md';
  }

  function buildPostContent(title, date, tags, content) {
    let fm = '---\n';
    fm += 'title: "' + title.replace(/"/g, '\\"') + '"\n';
    fm += 'date: ' + (date || new Date().toISOString().split('T')[0]) + ' 12:00:00 +0000\n';
    if (tags) {
      const tagArr = tags.split(',').map(t => t.trim()).filter(Boolean);
      if (tagArr.length) fm += 'tags: [' + tagArr.join(', ') + ']\n';
    }
    fm += '---\n\n';
    fm += content;
    return fm;
  }

  async function loadPosts() {
    try {
      const data = await ghFetch('/git/trees/main?recursive=1');
      const posts = data.tree.filter(f => f.path.startsWith('_posts/') && f.path.endsWith('.md'));
      const list = $('postsList');
      if (!posts.length) { list.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem">No posts yet.</p>'; return; }
      list.innerHTML = posts.sort((a,b) => b.path.localeCompare(a.path)).map(p => {
        const match = p.path.match(/_posts\/\d{4}-\d{2}-\d{2}-(.+)\.md$/);
        const title = match ? match[1].replace(/-/g, ' ') : p.path.replace('_posts/', '');
        return '<div class="admin-post-item">'
          + '<div><span class="p-title">' + title + '</span><span class="p-path">' + p.path.replace('_posts/', '') + '</span></div>'
          + '<div class="p-actions">'
          + '<button onclick="window._editPost(\'' + p.path + '\')">Edit</button>'
          + '<button class="del" onclick="window._deletePost(\'' + p.path + '\')">Del</button>'
          + '</div></div>';
      }).join('');
    } catch(e) {
      showMsg('Failed to load posts: ' + e.message, 'err');
    }
  }

  window._editPost = async function(path) {
    try {
      const data = await ghFetch('/contents/' + encodeURIComponent(path));
      const raw = decodeURIComponent(escape(atob(data.content)));
      const fmMatch = raw.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
      if (fmMatch) {
        const fm = fmMatch[1];
        const body = fmMatch[2].trim();
        const title = (fm.match(/title:\s*"?([^"\n]+)"?/) || [,''])[1];
        const date = (fm.match(/date:\s*(\S+)/) || [,''])[1];
        const tags = (fm.match(/tags:\s*\[([^\]]*)\]/) || [,''])[1];
        $('postTitle').value = title.trim();
        if (date) $('postDate').value = date.split(' ')[0];
        $('postTags').value = tags || '';
        $('postContent').value = body;
        currentFile = path;
        $('deleteBtn').style.display = 'inline-block';
        $('postStatus').textContent = 'Editing: ' + path;
        updateSlug();
        updatePreview();
        saveDraft();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    } catch(e) { showMsg('Failed to load post: ' + e.message, 'err'); }
  };

  window._deletePost = async function(path) {
    if (!confirm('Delete ' + path + '?')) return;
    try {
      await deleteFile(path, 'Delete ' + path);
      showMsg('Deleted!', 'ok');
      loadPosts();
      if (currentFile === path) newPost();
    } catch(e) { showMsg('Delete failed: ' + e.message, 'err'); }
  };

  function newPost() {
    $('postTitle').value = '';
    $('postDate').value = '';
    $('postTags').value = '';
    $('postContent').value = '';
    currentFile = null;
    $('deleteBtn').style.display = 'none';
    $('postStatus').textContent = '';
    localStorage.removeItem(DRAFT_KEY);
    updateSlug();
    updatePreview();
  }

  function updatePreview() {
    const content = $('postContent').value;
    const pane = $('previewContent');
    if (!content) { pane.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem">Preview will appear here...</p>'; return; }
    try { pane.innerHTML = marked.parse(content); } catch(e) { pane.innerHTML = '<p style="color:var(--d-red)">Preview error</p>'; }
  }

  // Auto-preview on input
  let previewTimer = null;
  $('postContent').addEventListener('input', function() {
    clearTimeout(previewTimer);
    previewTimer = setTimeout(updatePreview, 150);
    saveDraft();
  });

  $('postTitle').addEventListener('input', function() { updateSlug(); saveDraft(); });
  $('postDate').addEventListener('change', function() { updateSlug(); saveDraft(); });
  $('postTags').addEventListener('input', saveDraft);

  $('loginBtn').addEventListener('click', async function() {
    loginAttempted = true;
    const cfg = getConfig();
    if (!cfg.token || !cfg.owner) { showMsg('Token and owner required', 'err'); return; }
    try {
      const data = await ghFetch('');
      repo = data.name || 'hazouka.github.io';
      saveSettings();
      $('loginSection').style.display = 'none';
      $('editorSection').style.display = 'block';
      showMsg('Logged in as ' + cfg.owner + '/' + repo, 'ok');
      loadPosts();
      loadDraft();
      updatePreview();
    } catch(e) { showMsg('Login failed: ' + e.message, 'err'); }
  });

  $('clearLoginBtn').addEventListener('click', function() {
    clearSettings();
    showMsg('Credentials cleared', 'ok');
  });

  $('saveBtn').addEventListener('click', async function() {
    const title = $('postTitle').value.trim();
    const date = $('postDate').value;
    const tags = $('postTags').value.trim();
    const content = $('postContent').value.trim();
    if (!title || !content) { showMsg('Title and content required', 'err'); return; }
    const filename = currentFile || buildPostFilename(title, date);
    const fullContent = buildPostContent(title, date, tags, content);
    try {
      await saveFile(filename, fullContent, currentFile ? 'Update ' + currentFile : 'New post: ' + title);
      showMsg('Saved: ' + filename, 'ok');
      currentFile = filename;
      $('deleteBtn').style.display = 'inline-block';
      $('postStatus').textContent = 'Saved: ' + filename;
      localStorage.removeItem(DRAFT_KEY);
      loadPosts();
    } catch(e) { showMsg('Save failed: ' + e.message, 'err'); }
  });

  $('deleteBtn').addEventListener('click', function() {
    if (currentFile) window._deletePost(currentFile);
  });

  $('newPostBtn').addEventListener('click', newPost);

  // Auto-login on load
  loadSettings();
  const cfg = getConfig();
  if (cfg.token && cfg.owner) {
    (async function() {
      try {
        const data = await ghFetch('');
        repo = data.name || 'hazouka.github.io';
        $('loginSection').style.display = 'none';
        $('editorSection').style.display = 'block';
        loadPosts();
        loadDraft();
        updatePreview();
      } catch(e) { /* silent fallback */ }
    })();
  }
  var ep = new URLSearchParams(window.location.search).get('edit');
  if (ep) {
    (function waitEdit(){
      if (typeof repo !== 'undefined' && $('editorSection').style.display === 'block') {
        setTimeout(function(){ window._editPost(ep); }, 300);
      } else { setTimeout(waitEdit, 300); }
    })();
  }
})();
</script>
